<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E8B3C"/>
      <stop offset="100%" stop-color="#1A5CB3"/>
    </linearGradient>
  </defs>

  <!-- 배경: 그린 → 블루 대각선 그라데이션, 라운드 코너 -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- 왼쪽 J (그린 계열 영역) -->
  <text
    x="8.5"
    y="23.5"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="18"
    font-weight="900"
    fill="white"
    opacity="1"
  >J</text>

  <!-- 오른쪽 J (블루 계열 영역) -->
  <text
    x="18"
    y="23.5"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="18"
    font-weight="900"
    fill="white"
    opacity="0.88"
  >J</text>

  <!-- 두 J 사이 구분선 (로고의 & 앤퍼샌드 느낌) -->
  <line x1="16.5" y1="8" x2="16.5" y2="25" stroke="white" stroke-width="0.6" opacity="0.3"/>
</svg>
